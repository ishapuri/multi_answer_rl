# Model arguments
model_name_or_path: Qwen/Qwen2.5-7B
run_name: "math-rlvr-v1"
output_dir: data/math-rlvr-v1
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data training arguments
dataset_name: mehuldamani/big-math-digits

# GRPO trainer config
format_pattern: "tabc"
gradient_accumulation_steps: 64
hub_strategy: "end"
learning_rate: 1e-06
max_prompt_length: 1024
max_completion_length: 4096
max_steps: 200
num_generations: 32
num_train_epochs: 0.5
per_device_eval_batch_size: 32
per_device_train_batch_size: 6
push_to_hub: true
reward_funcs: ["format","accuracy","mean_confidence"]
reward_weights: [0,1,0]
seed: 43
sys_prompt_name: "tabc"
temperature: 0.7 
vllm_gpu_memory_utilization: 0.4
vllm_importance_sampling_correction: false
warmup_ratio: 0.10



#Not USEFUL
eval_strategy: "steps" 
eval_steps: 50
eval_on_start: false
log_completions: true
log_level: info
logging_steps: 1
logging_strategy: steps
overwrite_output_dir: true
save_strategy: "steps"
save_steps: 60
save_total_limit: 1
report_to:
- wandb
use_vllm: true
