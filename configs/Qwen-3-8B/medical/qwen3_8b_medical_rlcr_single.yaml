# Model arguments
model_name_or_path: Qwen/Qwen3-8B
run_name: "qwen3_8b_medical_rlcr_single"
output_dir: data/qwen3_8b_medical_rlcr_single
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data training arguments
dataset_name: mehuldamani/medDataset_25k

# GRPO trainer config
format_pattern: "tabc"
gradient_accumulation_steps: 32
hub_strategy: "end"
learning_rate: 1e-06
max_prompt_length: 3072
max_completion_length: 1536
max_steps: -1
num_generations: 32
num_train_epochs: 1
per_device_eval_batch_size: 32
per_device_train_batch_size: 8
num_candidates: 1
push_to_hub: true
reward_funcs: ["format","accuracy","brier","mean_confidence","confidence_one_or_zero","pass_at_1"]
reward_weights: [0.5,0.5,0.5,0.000001,0.000001,0.000001]
seed: 43
sys_prompt_name: "medical_rlcr_single_answer_no_extra_stuff_in_answer"
temperature: 0.7 
vllm_gpu_memory_utilization: 0.4
vllm_importance_sampling_correction: false
warmup_ratio: 0.05



#Not USEFUL
eval_strategy: "steps" 
eval_steps: 50
eval_on_start: false
log_completions: true
log_level: info
logging_steps: 1
logging_strategy: steps
overwrite_output_dir: true
save_strategy: "steps"
save_steps: 60
save_total_limit: 1
report_to:
- wandb
use_vllm: true

